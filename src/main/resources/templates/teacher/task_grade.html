<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>批改作业 - 教学平台</title>
  <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
    <style>
    body { background-color: var(--bg-main, #f5f0e6); color: var(--text-main, #1a1a1a); padding: 50px; font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif; }
    .form-container { max-width: 600px; background: var(--bg-card, #ffffff); padding: 30px; border: 2px solid var(--border-color, #121212); box-shadow: 6px 6px 0px var(--shadow-color, #121212); margin: 0 auto; }
    input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 20px; background: #ffffff; border: 2px solid var(--border-color, #121212); color: #1a1a1a; box-sizing: border-box; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; outline: none; }
    input:focus, select:focus, textarea:focus { background: #fdfbf7; }
    textarea { min-height: 100px; resize: vertical; }
    label { font-size: 14px; color: var(--text-main, #1a1a1a); font-weight: bold; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .btn-submit { background: var(--border-color, #121212); color: #ffffff; font-weight: bold; border: 2px solid var(--border-color, #121212); padding: 12px 20px; cursor: pointer; width: 100%; box-shadow: 4px 4px 0px var(--shadow-color, #121212); transition: transform 0.1s, box-shadow 0.1s; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; }
    .btn-submit:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--shadow-color, #121212); }
    .back-link { display: inline-block; margin-bottom: 20px; color: var(--link-color, #2a634b); font-weight: bold; text-decoration: underline; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; }
    .back-link:hover { color: var(--border-color, #121212); }
    h2 { margin-top: 0; margin-bottom: 25px; font-size: 24px; border-bottom: 2px solid var(--border-color, #121212); padding-bottom: 10px; }
    .tip { font-size: 12px; color: var(--muted, #555555); margin-top: -15px; margin-bottom: 15px; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <a href="javascript:history.back()" class="btn-back">返回</a>

  <div class="card student-info" th:if="${submission != null}">
    <h3>学生作业批改</h3>
    <p>学生<span th:text="${submission.studentName != null ? submission.studentName : '学生ID:' + submission.studentId}"></span></p>
    <p>提交时间<span th:text="${#dates.format(submission.submitTime, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
    <p>编程语言<span th:text="${submission.language != null ? submission.language : '-'}"></span></p>
  </div>

  <div class="card" th:if="${submission != null}">
    <h4>学生提交内容</h4>
    <div class="submission-content" th:text="${submission.content != null ? submission.content : '无内�?}"></div>
    <div th:if="${submission.fileUrl != null}">
      <a th:href="${submission.fileUrl}" style="color: #4a90e2;">📎 查看附件</a>
    </div>
  </div>

  <div class="card" th:if="${submission != null}">
    <h4>批改打分</h4>
    <form action="/teacher/task/grade" method="post">
      <input type="hidden" name="submissionId" th:value="${submission.submissionId}">

      <label>得分 (满分 <span th:text="${submission.score != null ? '已批�? : '待批�?}"></span>)</label>
      <input type="number" name="score" step="0.5" class="score-input" th:value="${submission.score != null ? submission.score : ''}" placeholder="请输入分�? required>

      <label>评语</label>
      <textarea name="comment" placeholder="请输入批改评�?.."> </textarea>

      <button type="submit" class="btn-submit">保存批改结果</button>
    </form>
  </div>

  <div th:if="${submission == null}" style="text-align: center;">
    <h3>提交记录不存在</h3>
    <a href="/teacher/task/manage" class="btn-submit">返回作业管理</a>
  </div>
</div>

</body>
</html>
