<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程主页 - <span th:text="${course.courseName}"></span></title>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f0e6; color: #333; font-family: sans-serif; }
        .header-bar {
            background-color: #264639; /* blue header */
            color: #fff;
            display: flex;
            align-items: center;
            height: 50px;
            padding: 0 20px;
        }
        .header-bar a {
            color: #fff; text-decoration: none; margin-right: 20px; font-size: 14px;
        }
        .header-bar a.active { font-weight: bold; border-bottom: 2px solid #fff; padding-bottom: 5px; }
        .main-content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }
        .task-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }
        .task-card {
            background: #fff;
            border-radius: 0;
            border: 2px solid #1a1a1a; box-shadow: 5px 5px 0px #1a1a1a;
            padding: 20px;
            width: calc(50% - 10px);
            box-sizing: border-box;
        }
        .task-title {
            font-weight: bold; font-size: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
        }
        .task-badge {
            background: #d89632; border: 1px solid #1a1a1a; box-shadow: 2px 2px 0px #1a1a1a; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 5px;
        }
        .task-meta { font-size: 12px; color: #666; margin-bottom: 15px; }
        .task-btn {
            background: #1a1a1a; box-shadow: 2px 2px 0px #1a1a1a; color: #fff; text-decoration: none; padding: 6px 15px; border-radius: 4px; font-size: 14px; display: inline-block;
        }
        .sidebar { width: 280px; }
        .sidebar-card { background: #fff; padding: 20px; border-radius: 0; border: 2px solid #1a1a1a; box-shadow: 5px 5px 0px #1a1a1a; text-align: left; }
        .header-right { margin-left: auto; display: flex; gap: 20px; align-items: center; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div style="font-weight: bold; margin-right: 30px;" th:text="${course.courseName}">课程名称</div>
        <a th:href="@{/student/course/detail/{id}(id=${course.courseId})}" class="active">首页</a>
        <a href="#">课程信息</a>
        <a href="#">在线作业</a>
        <a href="#">在线考试</a>
        <a href="#">编程实训</a>

        <div class="header-right">
            <span th:text="${session.currentUser.username}"></span>
            <a href="/home">返回个人主页</a>
        </div>
    </div>

    <div class="main-content">
        <div style="flex: 1;">
            <h3 style="margin-top: 0;">作业与通知</h3>
            <div class="task-grid">
                <div th:each="task : ${tasks}" class="task-card">
                    <div class="task-title">
                        <div>
                            <span class="task-badge">作业</span>
                            <span th:text="${task.title}">作业标题</span>
                        </div>
                        <a th:href="@{/student/task/detail(taskId=${task.taskId})}" class="task-btn">进入作业</a>
                    </div>
                    <div class="task-meta">
                        发布时间: <span th:text="${#dates.format(task.startTime, 'yyyy-MM-dd HH:mm')}"></span>
                        <br>
                        总分 / 满分: <span th:text="${task.fullScore}"></span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(tasks)}" style="color: #888; background: #fff; padding: 20px; border-radius: 0; width: 100%;">该课程暂无发布的作业或通知</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-card">
                <h4>课程进度 & 状态</h4>
                <p>状态 <span th:text="${course.status}">进行中</span></p>
                <p>教师ID: <span th:text="${course.teacherId}"></span></p>
                <p>学分: <span th:text="${course.credit}"></span> </p>
                <p style="white-space: pre-wrap; color: #666; font-size: 13px;" th:text="${course.description}"></p>
            </div>
        </div>
    </div>
</body>
</html>
